<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}EPMS{% endblock %} – Air Pollution Monitoring</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-cloud-haze2-fill text-warning me-2"></i>EPMS
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/alerts' %}active{% endif %}" href="/alerts">
            <i class="bi bi-bell-fill me-1"></i>Alerts
            <span id="alert-badge" class="badge bg-danger ms-1" style="display:none"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/analytics' %}active{% endif %}" href="/analytics">
            <i class="bi bi-bar-chart-line-fill me-1"></i>Analytics
          </a>
        </li>
      </ul>
      <span class="navbar-text text-muted small">
        <i class="bi bi-clock me-1"></i>
        <span id="live-clock"></span>
      </span>
    </div>
  </div>
</nav>

<!-- Alert banner for critical alerts -->
<div id="critical-banner" class="alert alert-danger alert-dismissible fade show m-0 rounded-0 d-none" role="alert">
  <i class="bi bi-exclamation-triangle-fill me-2"></i>
  <strong>CRITICAL ALERT:</strong> <span id="critical-banner-msg"></span>
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<main class="container-fluid py-3">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 small border-top mt-4">
  &copy; 2024 EPMS – AI-Powered Environmental Pollution Monitoring System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
