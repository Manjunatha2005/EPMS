{% extends "base.html" %}
{% block title %}Alerts{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-bell-fill text-danger me-2"></i>Pollution Alerts</h4>
  <div class="d-flex gap-2">
    <div class="form-check form-switch my-auto">
      <input class="form-check-input" type="checkbox" id="active-only-toggle" checked>
      <label class="form-check-label" for="active-only-toggle">Active only</label>
    </div>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadAlerts()">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
  </div>
</div>

<!-- Legend -->
<div class="d-flex gap-2 flex-wrap mb-3">
  <span class="badge severity-critical px-3 py-2">🔴 Critical</span>
  <span class="badge severity-high px-3 py-2">🟠 High</span>
  <span class="badge severity-moderate px-3 py-2">🟡 Moderate</span>
  <span class="badge severity-low px-3 py-2">🟢 Low</span>
  <span class="badge bg-secondary px-3 py-2">⚡ Predictive</span>
  <span class="badge bg-primary px-3 py-2">📡 Real-Time</span>
</div>

<div id="alerts-container">
  <div class="text-center text-muted py-5">
    <div class="spinner-border" role="status"></div>
    <p class="mt-2">Loading alerts…</p>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="/static/js/alerts.js"></script>
{% endblock %}
